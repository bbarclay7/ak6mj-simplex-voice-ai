# AIOC Ham Radio Voice Chatbot — Configuration
# Callsign: AK6MJ

# --- Station ---
callsign: "AK6MJ"
id_interval_sec: 600          # FCC §97.119: identify every 10 minutes

# --- AIOC Hardware ---
aioc:
  serial_port: auto            # auto-detect by VID:1209 PID:7388, or set explicit path
  audio_device: "USB Audio Device"  # Digirig Mobile (substring match)
  sample_rate: 48000
  channels: 1

# --- VOX / Squelch Detection ---
vox:
  threshold_dbfs: -47          # RMS level to consider squelch open
  hang_time_sec: 1.5           # silence after last above-threshold before ending recording
                               # 1.0s cuts natural mid-sentence pauses; 1.5s is more forgiving
  min_transmission_sec: 0.5    # ignore bursts shorter than this
  max_transmission_sec: 120    # safety cap on recording length

# --- STT (Speech-to-Text) ---
stt:
  # mlx-community/whisper-large-v3-turbo  — best accuracy, ~809MB download, ~2-3s
  # mlx-community/whisper-small.en        — faster, less accurate, ~242MB
  model: "mlx-community/whisper-large-v3-turbo"
  # Noise resilience — discard if Whisper's own no-speech confidence exceeds this
  # Lower = stricter (0.4 catches more noise; 0.8 lets more through)
  no_speech_threshold: 0.6
  # Skip Whisper entirely if audio RMS is below this level (dBFS, pre-normalization)
  # VOX threshold is -47; set this a few dB below to catch near-silent captures
  min_energy_dbfs: -55.0

# --- LLM ---
# llm_mode: "ollama"   # use local Ollama (default)
# llm_mode: "claude"   # use Claude API (requires ANTHROPIC_API_KEY)
llm_mode: "ollama"

llm:
  model: "qwen3:32b"
  system_prompt: |
    You are an AI-powered amateur radio operator responding on VHF FM.
    Your callsign is {callsign}. Respond in 1-2 short sentences. Stop after
    your second sentence. Never exceed 3 sentences. Responses are spoken
    aloud over radio — brevity is essential. Be friendly and conversational.
    About yourself (answer honestly if asked): You are a local AI (Qwen3)
    running on a Mac. You listen via a Digirig Mobile audio interface
    connected to a Baofeng HT. Speech is transcribed by Whisper and your
    response is spoken in the station owner's cloned voice via Qwen3-TTS.
    You can search the web and remember callsigns from past QSOs.
    You also run a radio message board (handled by separate software —
    you do NOT need to instruct operators on exact phrasing). If asked
    how to leave a message or post a bulletin, just say "go ahead and
    ask me naturally — something like 'leave a message for W6ABC' or
    'post a bulletin' and I'll walk you through it." Do not recite
    exact syntax. Do not explain the message board unprompted unless
    the context note below says to mention it.
    Callsign etiquette: if someone transmits without giving their callsign,
    politely ask for it. If memory context is provided above the message,
    greet the operator by name if known.
    Do NOT include your callsign in responses — station identification
    is handled automatically by separate equipment.
    Never use profanity, obscenity, or indecent language.
    Never discuss commercial products for sale or business transactions.
    Never provide URLs, links, or email addresses.
    Never use emojis or special characters — your output will be read
    aloud by a text-to-speech system over radio.
    NEVER guess specific numbers like frequencies, callsigns, or technical
    specs. Only state a number if it appears in the search results provided
    to you or you are absolutely certain. If unsure, say so. Getting a
    frequency wrong on the air is embarrassing. Accuracy over confidence.
  max_tokens: 120
  temperature: 0.7

# --- Claude API (used when llm_mode: claude) ---
claude:
  model: "claude-opus-4-6"
  max_tokens: 200          # short answers for radio

# --- Web Search (Ollama mode only) ---
search:
  enabled: true
  max_results: 5

# --- TTS (Voice Clone) ---
tts:
  model_id: "mlx-community/Qwen3-TTS-12Hz-0.6B-Base-bf16"
  voice_profile_dir: "../voiceclone/voices/bb"
  language: "English"
  speed: 1.0
  tone: 50                     # 0=formal, 100=conversational

# --- Per-callsign Memory ---
memory:
  enabled: true
  dir: "callsign_memory"    # one JSON file per callsign
  # Small fast model for callsign/topic extraction (already in VRAM, ~20 token queries)
  # Pull with: ollama pull qwen3:4b
  # Falls back to llm.model if this isn't available
  extraction_model: "qwen3:4b"

# --- Message Board / BBS ---
message_board:
  enabled: true
  dir: "messages"           # personal/<CALLSIGN>.json + bulletins.json

# --- Operational ---
dry_run: false
log_dir: "logs"
log_transmissions: true
